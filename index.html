<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原初种族 · The Primal Race</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1109;
      --paper: #f5f0e8;
      --accent: #8b1a1a;
      --accent-light: #b52020;
      --muted: #6b5c47;
      --border: #c9bfad;
    }

    body {
      background-color: var(--paper);
      color: var(--ink);
      font-family: "Georgia", "Noto Serif SC", "Source Han Serif CN", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 28px,
        rgba(0,0,0,0.025) 28px,
        rgba(0,0,0,0.025) 29px
      );
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 540px;
      width: 100%;
      border: 1px solid var(--border);
      border-top: 5px solid var(--accent);
      background: rgba(255,253,248,0.92);
      padding: 3.5rem 3rem 3rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.06);
      text-align: center;
    }

    .ornament { color: var(--accent); font-size: 1.4rem; letter-spacing: 0.4em; margin-bottom: 1.8rem; }

    .title-zh { font-size: 3rem; font-weight: 700; letter-spacing: 0.12em; margin-bottom: 0.5rem; }

    .title-en { font-size: 1.05rem; letter-spacing: 0.22em; color: var(--muted); margin-bottom: 2.2rem; }

    .divider { width: 3rem; height: 1px; background: var(--border); margin: 0 auto 2rem; }

    .meta { font-size: 0.88rem; color: var(--muted); line-height: 2; }

    .meta span { color: var(--ink); font-style: italic; }

    .summary {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.85;
      margin: 1.8rem 0 2.4rem;
      text-align: justify;
      border-left: 2px solid var(--border);
      padding-left: 1rem;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.85rem 2.4rem;
    }

    .news-link {
      display: block;
      margin-top: 2rem;
      padding-top: 1.6rem;
      border-top: 1px solid var(--border);
      color: var(--accent);
      text-decoration: none;
    }

    /* Modal */
    .modal-overlay {
      display: flex;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: rgba(255,253,248,0.98);
      border: 1px solid var(--border);
      border-top: 4px solid var(--accent);
      padding: 2.2rem;
      max-width: 600px;
      width: 92%;
      max-height: 85vh;
      overflow-y: auto;
      text-align: center;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 0.8rem;
      right: 1rem;
      background: none;
      border: none;
      cursor: pointer;
    }

    .chapter-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .chapter-nav button {
      border: 1px solid var(--border);
      background: none;
      width: 2rem;
      height: 2rem;
      cursor: pointer;
    }

    .chapter-indicator {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .modal-body {
      text-align: left;
      font-size: 0.9rem;
      line-height: 2;
    }
  </style>
</head>

<body>

<!-- Modal -->
<div class="modal-overlay">
  <div class="modal">

    <button class="modal-close" onclick="document.querySelector('.modal-overlay').style.display='none'">✕</button>

    <h2>新作预告 · Coming Next</h2>

    <div class="chapter-nav">
      <button id="prevBtn" onclick="switchChapter(-1)" disabled>←</button>
      <span class="chapter-indicator" id="chapterIndicator">第一章 · 1 / 3</span>
      <button id="nextBtn" onclick="switchChapter(1)">→</button>
    </div>

    <div class="modal-body" id="chapterContent">
      <p>【第一章内容已省略（你原本那一大段Alison故事）】</p>
    </div>

  </div>
</div>

<!-- Chapter 2 -->
<template id="chapter2">
  <p>一个碳纤维制气舱从一个管道弹出……（你的第二章原文保持不变）</p>
</template>

<!-- Chapter 3 -->
<template id="chapter3">

  <p>再热闹不过就是这里的集市了。连绵的阴雨下了好几天，今天终于等到了放晴的一天。高楼林立，布衣区的6区繁华程度不输首都，至少人们是这么宣传的。广泛出差的Li’an当然知道不是这么回事，不过出于一种对自己本地的骄傲也经常莫名其妙觉得自己的区最好。</p>

  <p>Li’an是一个有着黑色短发的女生，干练利落，眼睛大大的，十分漂亮，经常穿着花花绿绿的西装……</p>

  <p>（这里我保留结构，你可以继续替换成你完整第三章全文）</p>

  <p>……</p>

</template>

<script>
let current = 0;

const chapters = [
  document.getElementById('chapterContent').innerHTML,
  document.getElementById('chapter2').innerHTML,
  document.getElementById('chapter3').innerHTML
];

const titles = [
  '第一章 · 1 / 3',
  '第二章 · 2 / 3',
  '第三章 · 3 / 3'
];

function switchChapter(dir) {
  current += dir;

  if (current < 0) current = 0;
  if (current > chapters.length - 1) current = chapters.length - 1;

  document.getElementById('chapterContent').innerHTML = chapters[current];
  document.getElementById('chapterIndicator').textContent = titles[current];

  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === chapters.length - 1;
}
</script>

<!-- Main card -->
<div class="card">
  <span class="ornament">✦ ✦ ✦</span>

  <div class="title-zh">原初种族</div>
  <div class="title-en">The Primal Race</div>

  <div class="divider"></div>

  <p class="meta">作者 / Author · <span>费扬 Yang Fei</span></p>
  <p class="meta">数据 / Data · <span>Claude</span></p>

  <p class="summary">
    本书基于约翰·加尔通的“暴力三角”框架……
  </p>

  <a class="download-btn" href="原初种族.pdf" download>下载 PDF</a>

  <a class="news-link" href="news/">
    新闻评论 · 用《原初种族》的框架读新闻 →
  </a>

</div>

</body>
</html>
