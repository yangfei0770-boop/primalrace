<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原初种族 · The Primal Race</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1109;
      color: #f5f0e8;
      font-family: "Georgia", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .msg {
      font-size: 1.1rem;
      letter-spacing: 0.18em;
      color: #c9bfad;
      line-height: 2.2;
    }
    .msg span {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      color: #6b5c47;
      text-transform: uppercase;
      margin-top: 0.6rem;
    }
  </style>
</head>
<body>
  <div class="msg">
    网站维护中，敬请期待
    <span>Under Maintenance · Coming Soon</span>
  </div>
</body>
</html>
