name: Daily news commentary

on:
  schedule:
    - cron: '0,30 * * * *'     # every half hour
  workflow_dispatch:           # manual trigger from the Actions tab

# allow the workflow to push commits back to the repo
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r news/requirements.txt

      - name: Run pipeline
        env:
          PROVIDER:        ollama
          OLLAMA_BASE_URL: https://ollama.com
          OLLAMA_API_KEY:  ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL:    gemma4:31b-cloud
          PUBLISH_NEW:     '1'
          SKIP_PUSH:       '1'   # we commit from the workflow step below
          MAX_PER_RUN:     '10'  # cap per hourly run, rest waits in urls.txt
        working-directory: news
        run: python cron_pipeline.py

      - name: Commit if changed
        run: |
          git config user.email "bot@howtoraiseiq.com"
          git config user.name "breaking-news-bot"
          git add news/index.html news/news.db news/urls.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git commit -m "auto: refresh news commentary"
          # Push with retry: if someone (manual commit or another run) pushed
          # in the meantime, rebase atop them. On conflicts in binary files
          # (news.db), prefer our freshly-generated version with `-X ours`.
          for i in 1 2 3; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push rejected (attempt $i) — rebasing and retrying"
            git pull --rebase -X ours origin main || git rebase --abort
          done
          echo "failed after 3 retries"
          exit 1
