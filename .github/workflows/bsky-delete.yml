name: Delete all Bluesky posts

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm permanent deletion of ALL Bluesky posts'
        required: true
        default: ''

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests

      - name: Delete all posts
        env:
          BLUESKY_HANDLE: yang-fei0770.bsky.social
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          CONFIRM_DELETE: ${{ github.event.inputs.confirm }}
        working-directory: news
        run: python bsky_delete_all.py
